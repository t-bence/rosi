# ROSI configuration
# Run with: rosi run

# ── Input mode ────────────────────────────────────────────────────────────────
# Two mutually exclusive modes:
#   Simulation:   set sample_rate, duration, and sources (wav_file must be absent/null)
#   Measurement:  set wav_file pointing to a multi-channel WAV (sample_rate and
#                 duration are derived from the file; sources must be absent/null)
#
# wav_file: data/input/measurement.wav   # uncomment to use measurement mode

# ── Signal ────────────────────────────────────────────────────────────────────
sample_rate:    44100    # Hz          (simulation mode only)
duration:       10.0     # seconds     (simulation mode only)
speed_of_sound: 343.0    # m/s
rpm:            25       # rotor speed [rev/min]

# ── Microphone array ──────────────────────────────────────────────────────────
# Path to a CSV file with columns:  x, y, z  (metres)
# An optional header row is allowed; lines starting with # are ignored.
mic_positions_csv: data/input/mics.csv

# ── Scan grid (in the rotating frame) ─────────────────────────────────────────
scan_grid:
  r_max:   0.80   # outer radius of the scan area [m]
  n_r:     161     # number of radial steps
  n_theta: 161     # number of angular steps (360°/n_theta resolution)

# ── Beamforming ───────────────────────────────────────────────────────────────
fft_size: 1024   # Welch block length (applied to de-rotated DAS signal)
overlap:  0.5   # Welch block overlap fraction (0–1)
f_min:    2000  # lower edge of the frequency band to compute [Hz]
f_max:    8000  # upper edge of the frequency band to compute [Hz]

# ── Output ────────────────────────────────────────────────────────────────────
output_image: data/output/rosi_result.png  # output PNG filename

# ── Sources (simulation mode only) ────────────────────────────────────────────
# Each source is a tonal point source rotating with the rotor.
#   R         radius from the rotation axis [m]
#   phi0      initial angular position [radians]  (0 = positive x-axis)
#   freq      tone frequency [Hz]
#   amplitude source strength (arbitrary units)
#   phase     initial phase [radians]
sources:
  - R: 0.50
    phi0: 0.0
    freq: 3000
    amplitude: 1.0
    phase: 0.0
  - R: 0.30
    phi0: 2.094   # ≈ 2π/3 = 120°
    freq: 3300
    amplitude: 0.7
    phase: 0.785  # ≈ π/4
